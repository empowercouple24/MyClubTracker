<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nemecek Org Clubs</title>
  <meta name="description" content="Nutrition club management platform" />
  <meta name="theme-color" content="#e8edf4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NOC" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Outfit:wght@200;300;400;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --b9: #1e2d3d;
      --b8: #2a3f56;
      --b7: #3a5470;
      --b6: #4a6a8a;
      --b5: #5b80a0;
      --b4: #7599b8;
      --b3: #9ab4cc;
      --b2: #bfd0e0;
      --b1: #dde7f0;
      --b0: #f0f4f8;

      --bg-page: #e8edf4;
      --bg-page2: #dce3ed;
      --text: #1e2d3d;
      --text-muted: #5b7087;
      --text-faint: #8fa3b3;
      --surface: #ffffff;
      --surface-hover: #f5f8fb;
      --border: #cdd6e0;
      --border-focus: rgba(74,106,138,0.5);
      --accent: #3a5470;
      --accent-light: #5b80a0;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-page);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: var(--bg-page);
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(90,128,160,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 70% at 88% 85%, rgba(58,84,112,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 55% 40%, rgba(155,180,204,0.1) 0%, transparent 55%);
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(74,106,138,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,106,138,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: drift 12s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(91,128,160,0.2), transparent 70%);
      top: -150px; left: -100px;
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(58,84,112,0.14), transparent 70%);
      bottom: -100px; right: -80px;
      animation-delay: -6s;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 30px) scale(0.97); }
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--b7) 0%, var(--b5) 100%);
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(58,84,112,0.25), 0 2px 8px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }

    .logo-mark svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      position: relative;
      z-index: 1;
    }

    .org-name {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .org-sub {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* ── Form panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 4px 24px rgba(30,45,61,0.08), 0 1px 4px rgba(30,45,61,0.05);
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-title {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    /* ── Inputs ── */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: var(--b0);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .field input::placeholder {
      color: var(--text-faint);
    }

    .field input:focus {
      border-color: var(--b6);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(74,106,138,0.12);
    }

    /* ── Button ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--b7) 0%, var(--b5) 100%);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 16px rgba(58,84,112,0.25);
      letter-spacing: 0.2px;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(58,84,112,0.35);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(58,84,112,0.2);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── Error / status ── */
    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }

    .msg.error {
      background: rgba(200,50,50,0.07);
      border: 1px solid rgba(200,50,50,0.2);
      color: #c03030;
      display: block;
    }

    .msg.info {
      background: rgba(58,84,112,0.07);
      border: 1px solid rgba(58,84,112,0.2);
      color: var(--b7);
      display: block;
    }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Register link ── */
    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
    }

    .register-link a {
      color: var(--b6);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .register-link a:hover {
      color: var(--b7);
    }

    /* ── Redirect screen ── */
    #redirect-screen {
      display: none;
      text-align: center;
    }

    #redirect-screen.active {
      display: block;
    }

    .redirect-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--b7), var(--b5));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(58,84,112,0.25);
      animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .redirect-icon svg {
      width: 28px;
      height: 28px;
      stroke: white;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .redirect-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .redirect-sub {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.3px;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>

  <div class="page">
    <div class="card">

      <!-- Header -->
      <div class="header">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M8 12h8M12 8v8"/>
          </svg>
        </div>
        <div class="org-name">Nemecek Org Clubs</div>
        <div class="org-sub">Club management platform</div>
      </div>

      <!-- Login form -->
      <div id="login-screen">
        <div class="panel">
          <div class="panel-title">Sign in</div>

          <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          </div>

          <button class="btn-primary" id="login-btn" onclick="handleLogin()">
            Sign In
          </button>

          <div class="msg" id="login-msg"></div>
        </div>

        <div class="register-link">
          New location? <a href="register.html">Register with invite code →</a>
        </div>
      </div>

      <!-- Redirect screen -->
      <div id="redirect-screen">
        <div class="panel" style="text-align:center; padding: 40px 28px;">
          <div class="redirect-icon">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="redirect-title" id="redirect-title">Welcome back</div>
          <div class="redirect-sub" id="redirect-sub">Taking you to your dashboard…</div>
        </div>
      </div>

    </div>
  </div>

  <div class="footer">Nemecek Org Clubs · v1.0</div>

  <script>
    // ── Supabase init ──
    const SUPABASE_URL = 'https://ndaqlamzlaucigvnhgfu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_wO6XM4pC2CcaISQ8OlbkfQ_liqKJbi_';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Check if already logged in ──
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) await routeUser(session.user);
    })();

    // ── Login handler ──
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const msg = document.getElementById('login-msg');

      msg.className = 'msg';
      msg.textContent = '';

      if (!email || !password) {
        showMsg('error', 'Please enter your email and password.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        btn.disabled = false;
        btn.textContent = 'Sign In';
        showMsg('error', error.message || 'Sign in failed. Please try again.');
        return;
      }

      await routeUser(data.user);
    }

    // ── Route based on role ──
    async function routeUser(user) {
      const { data: userData, error } = await sb
        .from('users')
        .select('role, location_id, locations(name)')
        .eq('id', user.id)
        .single();

      if (error || !userData) {
        showMsg('error', 'Account not found. Contact your administrator.');
        await sb.auth.signOut();
        document.getElementById('login-btn').disabled = false;
        document.getElementById('login-btn').textContent = 'Sign In';
        return;
      }

      // Show redirect screen
      document.getElementById('login-screen').style.display = 'none';
      const rs = document.getElementById('redirect-screen');
      rs.classList.add('active');

      if (userData.role === 'admin') {
        document.getElementById('redirect-title').textContent = 'Welcome, Jeffrey';
        document.getElementById('redirect-sub').textContent = 'Loading admin dashboard…';
        setTimeout(() => { window.location.href = 'admin.html'; }, 1200);
      } else {
        const clubName = userData.locations?.name || 'your club';
        document.getElementById('redirect-title').textContent = 'Welcome back!';
        document.getElementById('redirect-sub').textContent = `Loading ${clubName}…`;
        setTimeout(() => { window.location.href = 'app.html'; }, 1200);
      }
    }

    function showMsg(type, text) {
      const msg = document.getElementById('login-msg');
      msg.className = `msg ${type}`;
      msg.textContent = text;
    }

    // ── Enter key support ──
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
</body>
</html>
