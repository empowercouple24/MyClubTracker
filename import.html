function fmt$(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

function log(msg,cls='log-info'){
  const el=document.getElementById('log');
  el.innerHTML+=`<div class="${cls}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

function setStatus(msg){document.getElementById('status').textContent=msg;}
function setProgress(pct){document.getElementById('prog').style.width=pct+'%';}

function togglePreview(){
  const card=document.getElementById('preview-card');
  if(card.style.display==='none'){
    card.style.display='block';
    const body=document.getElementById('preview-body');
    body.innerHTML=ENTRIES.slice(0,20).map(e=>`
      <tr>
        <td>${e.date}</td>
        <td>${fmt$(e.data.cashSales)}</td>
        <td>${fmt$(e.data.cardSales)}</td>
        <td>${fmt$(e.data.cardFees)}</td>
        <td>${Number(e.data.dv||0).toFixed(2)}</td>
        <td>${fmt$(e.data.totalSales)}</td>
        <td>${fmt$(e.data.payouts)}</td>
        <td>${e.data.op1||'—'}</td>
        <td>${e.data.op1Hrs||'—'}</td>
        <td>${e.data.op2||'—'}</td>
        <td>${e.data.op2Hrs||'—'}</td>
      </tr>`).join('');
  } else {
    card.style.display='none';
  }
}

async function startImport(){
  const btn=document.getElementById('btn-import');
  btn.disabled=true;
  btn.textContent='Importing...';
  document.getElementById('log').innerHTML='';

  // Check auth
  const{data:{session}}=await sb.auth.getSession();
  if(!session){log('❌ Not signed in. Please sign in to myclubtracker.com first, then open this file.','log-err');btn.disabled=false;btn.textContent='▶ Run Import';return;}
  log(`✓ Signed in as ${session.user.email}`,'log-ok');

  // Fetch existing dates to avoid duplicates
  log('Fetching existing records...','log-info');
  const{data:existing}=await sb.from('days').select('date').eq('location_id',LOCATION_ID);
  const existingDates=new Set((existing||[]).map(d=>d.date));
  log(`Found ${existingDates.size} existing records in Supabase`,'log-info');

  let inserted=0,skipped=0,errors=0;
  const total=ENTRIES.length;

  for(let i=0;i<ENTRIES.length;i++){
    const entry=ENTRIES[i];
    setProgress(Math.round((i/total)*100));
    setStatus(`Processing ${i+1} of ${total}...`);

    if(existingDates.has(entry.date)){
      log(`⟳ SKIP ${entry.date} — already exists`,'log-skip');
      skipped++;
      continue;
    }

    const{error}=await sb.from('days').insert({
      location_id:LOCATION_ID,
      date:entry.date,
      data:entry.data
    });

    if(error){
      log(`✗ ERROR ${entry.date}: ${error.message}`,'log-err');
      errors++;
    } else {
      log(`✓ ${entry.date} — ${fmt$(entry.data.totalSales)} sales, DV ${Number(entry.data.dv||0).toFixed(1)}`,'log-ok');
      inserted++;
    }

    // Small delay to avoid rate limiting
    await new Promise(r=>setTimeout(r,50));
  }

  setProgress(100);
  setStatus(`Done! ${inserted} inserted · ${skipped} skipped · ${errors} errors`);
  log(`\n✅ Import complete: ${inserted} inserted, ${skipped} skipped, ${errors} errors`,'log-ok');
  btn.textContent='✓ Done';
}
